name: Build Darling dependency bundle

on:
  workflow_dispatch:
    inputs:
      include_darling_source:
        description: Include Darling source archive in the ZIP
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      commit_output:
        description: Commit generated ZIP or split ZIP parts back to the repository
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    paths:
      - scripts/build_darling_dependency_bundle.sh
      - .github/workflows/build-darling-dependencies.yml

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Ubuntu dependency ZIP
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build bundle
        env:
          INCLUDE_DARLING_SOURCE: ${{ github.event.inputs.include_darling_source || 'true' }}
        run: |
          chmod +x scripts/build_darling_dependency_bundle.sh
          scripts/build_darling_dependency_bundle.sh

      - name: Prepare generated files for repository commit
        id: prepare_commit
        if: ${{ github.event.inputs.commit_output != 'false' }}
        run: |
          set -euxo pipefail
          mkdir -p generated
          rm -f generated/darling_offline_bundle_ubuntu_22_04_amd64.zip generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.* generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256 generated/README.md

          ZIP="dist/darling_offline_bundle_ubuntu_22_04_amd64.zip"
          SHA="dist/darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256"
          SIZE_BYTES=$(stat -c%s "$ZIP")
          LIMIT_BYTES=$((95 * 1024 * 1024))

          cp "$SHA" generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256

          if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "ZIP is larger than 95 MB; splitting before committing."
            split -b 95m -d -a 3 "$ZIP" generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.part-
            MODE="split"
          else
            echo "ZIP is under 95 MB; committing as one file."
            cp "$ZIP" generated/darling_offline_bundle_ubuntu_22_04_amd64.zip
            MODE="single"
          fi

          cat > generated/README.md <<'EOF'
          # Generated Darling dependency bundle

          This folder is generated by the GitHub Actions workflow:

          - `.github/workflows/build-darling-dependencies.yml`
          - `scripts/build_darling_dependency_bundle.sh`

          The bundle targets Ubuntu 22.04 amd64 and is intended for testing/building Darling on Linux.

          ## Files

          - `darling_offline_bundle_ubuntu_22_04_amd64.zip` if the ZIP is small enough for GitHub.
          - `darling_offline_bundle_ubuntu_22_04_amd64.zip.part-*` if the ZIP was split to stay below GitHub's per-file size limit.
          - `darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256` contains the SHA-256 hash of the original ZIP.

          ## Reassemble split parts

          If split parts were committed, run this from the repository root:

          ```bash
          cat generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.part-* > darling_offline_bundle_ubuntu_22_04_amd64.zip
          sha256sum -c generated/darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256
          ```

          The Actions run also uploads the original ZIP as a workflow artifact, but the repository copy under `generated/` is the durable copy.
          EOF

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Commit generated bundle back to repository
        if: ${{ github.event.inputs.commit_output != 'false' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add generated Darling dependency bundle
          file_pattern: generated/*

      - name: Upload original ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: darling-offline-bundle-ubuntu-22-04-amd64
          path: |
            dist/darling_offline_bundle_ubuntu_22_04_amd64.zip
            dist/darling_offline_bundle_ubuntu_22_04_amd64.zip.sha256
          if-no-files-found: error
          retention-days: 14
